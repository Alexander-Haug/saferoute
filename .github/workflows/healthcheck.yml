name: Healthcheck — SafeRoute

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping SafeRoute /api/info
        continue-on-error: true
        run: |
          echo "Pinging $APP_URL/api/info"
          curl -sS --max-time 90 --retry 3 --retry-delay 15 "$APP_URL/api/info"
        env:
          APP_URL: ${{ secrets.APP_URL }}
